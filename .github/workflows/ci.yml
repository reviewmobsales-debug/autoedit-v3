name: AutoEdit CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install ffmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg
    - name: Install dependencies
      run: pip install flask pillow numpy
    - name: Compile check
      run: python3 -m py_compile main.py
    - name: Import check
      run: python3 -c "from editor.effects import remove_silences; print('OK')"
